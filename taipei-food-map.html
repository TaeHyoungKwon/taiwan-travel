<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타이베이 맛집 지도 🇹🇼</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        #map { width: 100%; height: 100vh; }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 340px;
            height: 100vh;
            background: #fff;
            z-index: 1000;
            overflow-y: auto;
            box-shadow: 2px 0 12px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }
        .sidebar.collapsed { transform: translateX(-340px); }

        .sidebar-toggle {
            position: fixed;
            top: 12px;
            left: 350px;
            z-index: 1001;
            background: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: left 0.3s ease;
        }
        .sidebar.collapsed + .sidebar-toggle { left: 12px; }

        .sidebar-header {
            background: linear-gradient(135deg, #e74c3c, #e67e22);
            color: white;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .sidebar-header h1 { font-size: 22px; margin-bottom: 4px; }
        .sidebar-header p { font-size: 13px; opacity: 0.9; }

        .filter-bar {
            padding: 10px 16px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            position: sticky;
            top: 72px;
            z-index: 9;
        }
        .filter-btn {
            padding: 5px 10px;
            border: 1px solid #dee2e6;
            border-radius: 16px;
            background: white;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .filter-btn:hover { background: #f1f3f5; }
        .filter-btn.active { background: #e74c3c; color: white; border-color: #e74c3c; }

        .place-list { padding: 8px 0; }

        .place-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f1f3f5;
            transition: background 0.15s;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .place-item:hover { background: #fff5f5; }
        .place-item.hidden { display: none; }

        .place-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .place-info { flex: 1; min-width: 0; }
        .place-name {
            font-weight: 600;
            font-size: 14px;
            color: #212529;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .place-name .star { color: #f1c40f; }
        .place-desc {
            font-size: 12px;
            color: #868e96;
            margin-top: 2px;
            line-height: 1.4;
        }
        .place-area {
            font-size: 11px;
            color: #adb5bd;
            margin-top: 2px;
        }
        .gmaps-link {
            display: inline-block;
            margin-top: 4px;
            font-size: 11px;
            color: #4285f4;
            text-decoration: none;
        }
        .gmaps-link:hover { text-decoration: underline; }

        .leaflet-popup-content { min-width: 200px; }
        .popup-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
        .popup-desc { font-size: 13px; color: #555; margin-bottom: 6px; line-height: 1.4; }
        .popup-link {
            display: inline-block;
            padding: 6px 14px;
            background: #4285f4 !important;
            color: #ffffff !important;
            border-radius: 6px;
            text-decoration: none !important;
            font-size: 12px;
            font-weight: 600;
        }
        .popup-link:hover { background: #3367d6 !important; color: #ffffff !important; }

        .category-header {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 700;
            color: #495057;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            position: sticky;
            top: 108px;
            z-index: 5;
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: 45vh; top: auto; bottom: 0; transform: translateY(0); }
            .sidebar.collapsed { transform: translateY(calc(45vh - 48px)); }
            #map { height: 60vh; }
            .sidebar-toggle { display: none; }
            .sidebar-header { padding: 12px 16px; cursor: pointer; }
            .sidebar-header h1 { font-size: 18px; }
        }
    </style>

        { name: "승지도 마사지", desc: "5%할인 타이베이역 근처", area: "타이베이역", cat: "마사지", star: 0, lat: 25.0480, lng: 121.5170, url: "https://maps.app.goo.gl/48sRw5zmSneawWNr6" },
        { name: "노아 마사지", desc: "10%할인 중산 리젠트호텔 근처", area: "중산", cat: "마사지", star: 0, lat: 25.0530, lng: 121.5230, url: "https://maps.app.goo.gl/FkcmaGdgLhMDo2XS6" },

        // === 쇼핑 ===
        { name: "우산왕", desc: "시먼 우산 가게", area: "시먼딩", cat: "쇼핑", star: 0, lat: 25.0440, lng: 121.5070, url: "https://maps.app.goo.gl/QfdriLxygpK37qdE7" },

        // === 스린야시장 ===
        { name: "스린 분위기 술집", desc: "🌟 사장님 유쾌! (음식은 따로 안팔아요)", area: "스린야시장", cat: "야시장", star: 1, lat: 25.0882, lng: 121.5245, url: "https://maps.app.goo.gl/MFBGkftf3iEacnYt8" },
        { name: "스린 지파이 (鷄排)", desc: "그 유명한 스린 지파이!", area: "스린야시장", cat: "야시장", star: 0, lat: 25.0880, lng: 121.5240, url: "https://maps.app.goo.gl/uu8XehhZNgzKJLyQ9" },
        { name: "스린 대만식 스테이크", desc: "밑에 면+위에 고기 스타일", area: "스린야시장", cat: "야시장", star: 0, lat: 25.0878, lng: 121.5248, url: "https://maps.app.goo.gl/f7nKySNQ9Cj5qn9i8" },
        { name: "스린 태국음식", desc: "대만에서 태국음식이 맛있고 싸요!", area: "스린야시장", cat: "야시장", star: 0, lat: 25.0885, lng: 121.5238, url: "https://maps.app.goo.gl/uVopgYna3rasgKMVA" },
        { name: "스린 대만식 꼬치", desc: "🌟 진짜 추천! 맥주랑 완전 잘어울려요", area: "스린야시장", cat: "야시장", star: 1, lat: 25.0876, lng: 121.5242, url: "https://maps.app.goo.gl/v7QjaihjRMJE93Vc7" },

        // === 닝샤야시장 ===
        { name: "닝샤 또우화 (豆花)", desc: "🌟 대만에서 무조건 먹어야하는 디저트! 닝샤 최고", area: "닝샤야시장", cat: "야시장", star: 1, lat: 25.0555, lng: 121.5152, url: "https://maps.app.goo.gl/LbzTbYkAkXGjJS1GA" },
        { name: "닝샤 미슐랭 굴전", desc: "미슐랭 받은 굴전! 한국이랑 다른 스타일", area: "닝샤야시장", cat: "야시장", star: 0, lat: 25.0558, lng: 121.5155, url: "https://maps.app.goo.gl/sYn4dgvisbG2cTVQ7" },
        { name: "닝샤 꿀토마토", desc: "꼭 드셔보세요 맛나요!!!", area: "닝샤야시장", cat: "야시장", star: 0, lat: 25.0552, lng: 121.5148, url: "https://maps.app.goo.gl/v1gpcPxSMvEXw1zo8" },
        { name: "닝샤 오징어+오이", desc: "🌟 제일 좋아하는 곳… 줄 엄청 길어요 ㅠㅠ", area: "닝샤야시장", cat: "야시장", star: 1, lat: 25.0560, lng: 121.5150, url: "https://maps.app.goo.gl/oUe92ZH4jr7qyVzM9" },

        // === 고궁 근처 ===
        { name: "고궁정화", desc: "동파육, 우육면 정말 맛있어요👍", area: "고궁", cat: "고궁근처", star: 0, lat: 25.1020, lng: 121.5485, url: "https://maps.app.goo.gl/p5a5CL8PhCpGcoTZ6" },
        { name: "딤섬키친", desc: "딤섬 뷔페집!", area: "고궁", cat: "고궁근처", star: 0, lat: 25.1015, lng: 121.5490, url: "https://maps.app.goo.gl/qaV6kJjqxcqjkrrh8" }
    ];

    // Initialize map
    const map = L.map('map', { zoomControl: false }).setView([25.048, 121.515], 13);
    L.control.zoom({ position: 'topright' }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
        maxZoom: 19
    }).addTo(map);

    // Create markers
    const markers = {};
    const markerGroup = L.featureGroup();

    places.forEach((p, i) => {
        const cat = categories[p.cat] || { icon: "📍", color: "#999" };
        const starStr = p.star > 0 ? "⭐".repeat(p.star) + " " : "";

        const icon = L.divIcon({
            className: 'custom-marker',
            html: `<div style="
                background: ${cat.color};
                width: 30px; height: 30px;
                border-radius: 50%;
                display: flex; align-items: center; justify-content: center;
                font-size: 16px;
                border: 2px solid white;
                box-shadow: 0 2px 6px rgba(0,0,0,0.3);
                ${p.star >= 2 ? 'width:36px;height:36px;border:3px solid gold;' : ''}
            ">${cat.icon}</div>`,
            iconSize: [p.star >= 2 ? 36 : 30, p.star >= 2 ? 36 : 30],
            iconAnchor: [15, 15]
        });

        const popupContent = `
            <div class="popup-title">${starStr}${p.name}</div>
            <div class="popup-desc">${p.desc}<br><small style="color:#aaa">${p.area}</small></div>
            ${p.url ? `<a class="popup-link" href="${p.url}" target="_blank">Google Maps에서 보기 →</a>` : ''}
        `;

        const marker = L.marker([p.lat, p.lng], { icon })
            .bindPopup(popupContent)
            .addTo(map);

        marker._placeIndex = i;
        markers[i] = marker;
        markerGroup.addLayer(marker);
    });

    // Build sidebar
    const filterBar = document.getElementById('filterBar');
    const placeList = document.getElementById('placeList');

    // Filter buttons
    const allBtn = document.createElement('button');
    allBtn.className = 'filter-btn active';
    allBtn.textContent = '전체';
    allBtn.dataset.cat = 'all';
    filterBar.appendChild(allBtn);

    const usedCats = [...new Set(places.map(p => p.cat))];
    usedCats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = `${categories[cat]?.icon || ''} ${cat}`;
        btn.dataset.cat = cat;
        filterBar.appendChild(btn);
    });

    // Place list grouped by category
    function renderList(filterCat) {
        placeList.innerHTML = '';
        const groups = {};
        places.forEach((p, i) => {
            if (filterCat !== 'all' && p.cat !== filterCat) return;
            if (!groups[p.cat]) groups[p.cat] = [];
            groups[p.cat].push({ ...p, idx: i });
        });

        Object.entries(groups).forEach(([cat, items]) => {
            const catInfo = categories[cat] || { icon: "📍", color: "#999" };
            const header = document.createElement('div');
            header.className = 'category-header';
            header.textContent = `${catInfo.icon} ${cat} (${items.length})`;
            placeList.appendChild(header);

            items.forEach(p => {
                const div = document.createElement('div');
                div.className = 'place-item';
                div.dataset.idx = p.idx;
                div.innerHTML = `
                    <div class="place-icon" style="background:${catInfo.color}20">${catInfo.icon}</div>
                    <div class="place-info">
                        <div class="place-name">
                            ${p.star > 0 ? `<span class="star">${"⭐".repeat(p.star)}</span>` : ''}
                            ${p.name}
                        </div>
                        <div class="place-desc">${p.desc}</div>
                        <div class="place-area">📍 ${p.area}</div>
                        ${p.url ? `<a class="gmaps-link" href="${p.url}" target="_blank" onclick="event.stopPropagation()">Google Maps →</a>` : ''}
                    </div>
                `;
                div.addEventListener('click', () => {
                    map.setView([p.lat, p.lng], 17);
                    markers[p.idx].openPopup();
                });
                placeList.appendChild(div);
            });
        });
    }

    renderList('all');

    // Filter click
    filterBar.addEventListener('click', (e) => {
        if (!e.target.classList.contains('filter-btn')) return;
        filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        const cat = e.target.dataset.cat;
        renderList(cat);

        // Show/hide markers
        places.forEach((p, i) => {
            if (cat === 'all' || p.cat === cat) {
                if (!map.hasLayer(markers[i])) markers[i].addTo(map);
            } else {
                map.removeLayer(markers[i]);
            }
        });

        if (cat !== 'all') {
            const visible = places.filter(p => p.cat === cat);
            if (visible.length > 0) {
                const group = L.featureGroup(visible.map((_, vi) => {
                    const idx = places.findIndex(p => p === visible[vi] || (p.name === visible[vi].name));
                    return markers[places.indexOf(visible[vi])];
                }));
                map.fitBounds(group.getBounds().pad(0.2));
            }
        } else {
            map.fitBounds(markerGroup.getBounds().pad(0.1));
        }
    });
    </script>
